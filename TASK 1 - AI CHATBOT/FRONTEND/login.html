<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050513;
      --surface: rgba(16, 12, 45, 0.92);
      --text: #edf0ff;
      --accent: #7f74ff;
      --accent-2: #27f7ff;
      --danger: #ff5f7d;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Sora', sans-serif;
      background: radial-gradient(circle at top left, rgba(106, 87, 255, 0.16), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(37, 234, 255, 0.12), transparent 20%),
                  var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .star-field {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .star-field::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.25) 0.8px, transparent 0);
      background-size: 100px 100px;
      animation: drift 24s linear infinite;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(-120px, 140px); }
    }

    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      background: rgba(11, 9, 26, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(26px);
      box-shadow: 0 32px 96px rgba(2, 3, 20, 0.44);
    }

    .logo-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.18em;
      color: #d0d1ff;
      text-shadow: 0 0 25px rgba(106, 102, 255, 0.32), 0 0 48px rgba(31, 226, 255, 0.14);
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 32px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #9aa0c6;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(19, 16, 44, 0.92);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      backdrop-filter: blur(24px);
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: rgba(106, 102, 255, 0.4);
      box-shadow: inset 0 0 0 1px rgba(106,102,255,0.4);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 18px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6a66ff 0%, #39d7e2 100%);
      color: #fff;
      box-shadow: 0 16px 30px rgba(64, 88, 255, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px rgba(64, 88, 255, 0.4);
    }

    .btn-secondary {
      background: rgba(88, 76, 170, 0.24);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(100, 95, 255, 0.18);
    }

    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #9aa0c6;
    }

    .toggle-link button {
      background: none;
      border: none;
      color: var(--accent-2);
      cursor: pointer;
      padding: 0;
      font-weight: 600;
      text-decoration: underline;
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    .error-msg.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="star-field" aria-hidden="true"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="logo-badge">ARIA</div>
      
      <div id="loginForm">
        <h2 class="auth-title">Welcome Back</h2>
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" />
        </div>
        <div id="loginError" class="error-msg"></div>
        <div class="button-group">
          <button class="btn-primary" id="loginBtn">Login</button>
        </div>
        <div class="toggle-link">
          Don't have an account? <button id="toggleToRegister">Register</button>
        </div>
      </div>

      <div id="registerForm" style="display: none;">
        <h2 class="auth-title">Create Account</h2>
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Create a password" />
        </div>
        <div id="regError" class="error-msg"></div>
        <div class="button-group">
          <button class="btn-primary" id="registerBtn">Register</button>
        </div>
        <div class="toggle-link">
          Already have an account? <button id="toggleToLogin">Login</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toggleToRegister = document.getElementById('toggleToRegister');
    const toggleToLogin = document.getElementById('toggleToLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginError = document.getElementById('loginError');
    const regError = document.getElementById('regError');

    toggleToRegister.addEventListener('click', () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
    });

    toggleToLogin.addEventListener('click', () => {
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
    });

    loginBtn.addEventListener('click', async () => {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        loginError.textContent = 'Please fill in all fields';
        loginError.classList.add('show');
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.success) {
          localStorage.setItem('userId', data.userId);
          window.location.href = '/chat.html';
        } else {
          loginError.textContent = data.error || 'Login failed';
          loginError.classList.add('show');
        }
      } catch (err) {
        loginError.textContent = 'Error connecting to server';
        loginError.classList.add('show');
      }
    });

    registerBtn.addEventListener('click', async () => {
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;

      if (!username || !password) {
        regError.textContent = 'Please fill in all fields';
        regError.classList.add('show');
        return;
      }

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.success) {
          localStorage.setItem('userId', username);
          window.location.href = '/chat.html';
        } else {
          regError.textContent = data.error || 'Registration failed';
          regError.classList.add('show');
        }
      } catch (err) {
        regError.textContent = 'Error connecting to server';
        regError.classList.add('show');
      }
    });

    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    document.getElementById('regPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') registerBtn.click();
    });
  </script>
</body>
</html>
